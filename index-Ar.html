         <!--Map coordinate--> 
         <style>
           
#coordinate-display {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000; /* Must be higher than map z-index */
    display: flex;
    align-items: center;
    gap: 10px;
}

#coords-box {
    /* Glassmorphism Effect */
    background: rgba(0, 153, 255, 0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    
    color: white;
    padding: 8px 18px;
    border-radius: 30px;
    font-family: 'Monaco', 'Consolas', monospace;
    font-size: 13px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: opacity 0.3s ease, visibility 0.3s ease;
    white-space: nowrap;
}

#toggle-coords {
    background: white;
    border: none;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
}

#toggle-coords:hover {
    transform: scale(1.1);
}

/* Class to hide the coordinates */
#hidden-coords {
    opacity: 0;
    visibility: hidden;
}
